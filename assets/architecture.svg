<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" fill="#f7f7f8"/>
  <text x="600" y="45" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#222">Jamf Health Repair via Support App</text>
  <g font-family="Arial" font-size="18" fill="#222">
    <rect x="60" y="110" width="220" height="100" rx="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="170" y="150" text-anchor="middle" font-weight="700">User</text>
    <text x="170" y="178" text-anchor="middle">Clicks Support App</text>
    <text x="170" y="202" text-anchor="middle">Repair Jamf / MDM</text>

    <rect x="360" y="110" width="240" height="100" rx="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="480" y="150" text-anchor="middle" font-weight="700">Support App</text>
    <text x="480" y="178" text-anchor="middle">PrivilegedScript</text>
    <text x="480" y="202" text-anchor="middle">runs as root</text>

    <rect x="690" y="110" width="240" height="100" rx="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="810" y="150" text-anchor="middle" font-weight="700">Repair Script</text>
    <text x="810" y="178" text-anchor="middle">Health checks</text>
    <text x="810" y="202" text-anchor="middle">cleanup + re-enroll</text>

    <rect x="455" y="310" width="290" height="110" rx="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="600" y="350" text-anchor="middle" font-weight="700">Jamf Pro / ADE / MDM</text>
    <text x="600" y="380" text-anchor="middle">Device receives MDM profile</text>
    <text x="600" y="405" text-anchor="middle">User completes SSO sign-in</text>
  </g>
  <g stroke="#333" stroke-width="3" marker-end="url(#arrow)">
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
    <line x1="280" y1="160" x2="360" y2="160"/>
    <line x1="600" y1="160" x2="690" y2="160"/>
    <path d="M810 210 C810 275, 700 300, 650 310" fill="none"/>
    <path d="M550 310 C470 280, 450 235, 480 210" fill="none"/>
  </g>
</svg>
